cubes:
  - name: Orders
    sql_table: mart.v_business_branch_daily
    data_source: default
    title: "주문"

    measures:
      - name: orders
        title: "주문수"
        sql: orders
        type: sum
      - name: netRevenue
        title: "순매출"
        sql: net_revenue_native
        type: sum
        format: currency
      - name: grossRevenue
        title: "총매출"
        sql: gross_revenue_native
        type: sum
        format: currency

    dimensions:
      - name: id
        sql: "CONCAT(CAST(report_date AS STRING), '|', branch_id)"
        type: string
        primary_key: true
        public: false
      - name: reportDate
        title: "주문일"
        sql: "CAST(report_date AS TIMESTAMP)"
        type: time
      - name: branchId
        title: "지점"
        sql: branch_id
        type: string
      - name: currencyCode
        title: "통화"
        sql: currency_code
        type: string
      - name: sourceTier
        title: "데이터 출처 등급"
        sql: "'demo'"
        type: string

    joins:
      - name: Branch
        sql: "{CUBE.branchId} = {Branch.branchId}"
        relationship: many_to_one
