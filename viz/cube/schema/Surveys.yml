cubes:
  - name: Surveys
    sql_table: mart.v_survey_branch_daily
    data_source: default
    title: "설문"

    measures:
      - name: responseCount
        title: "응답수"
        sql: response_count
        type: sum
      - name: avgScore
        title: "평균 점수"
        sql: avg_answer_score
        type: avg

    dimensions:
      - name: id
        sql: "CONCAT(CAST(report_date AS STRING), '|', branch_id)"
        type: string
        primary_key: true
        public: false
      - name: reportDate
        title: "응답일"
        sql: "CAST(report_date AS TIMESTAMP)"
        type: time
      - name: branchId
        title: "지점"
        sql: branch_id
        type: string
      - name: sourceTier
        title: "데이터 출처 등급"
        sql: "'demo'"
        type: string

    joins:
      - name: Branch
        sql: "{CUBE.branchId} = {Branch.branchId}"
        relationship: many_to_one
